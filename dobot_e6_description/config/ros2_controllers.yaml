controller_manager:
  ros__parameters:
    update_rate: 50

    arm_controller:
      type: joint_trajectory_controller/JointTrajectoryController

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

  
arm_controller:
  ros__parameters:

    joints:
      - base_link_to_link1
      - link1_to_link2
      - link2_to_link3
      - link3_to_link4
      - link4_to_link5
      - link5_to_flange

    command_interfaces:
      - position

    state_interfaces:
      - position